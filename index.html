<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit a Tip</title>

  <style>
    :root {
      --primary: #1d4ed8;
      --border: #e5e7eb;
      --bg: #f9fafb;
      --text: #111827;
      --muted: #6b7280;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 760px;
      margin: auto;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 6px;
    }

    p.subtitle {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .card {
      background: #ffffff;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 24px;
    }

    label {
      display: block;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      font-size: 18px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 22px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input[type="file"] {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .hint {
      font-size: 14px;
      color: var(--muted);
      margin-top: -14px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      font-size: 18px;
      padding: 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
    }

    .submit {
      background: var(--primary);
      color: white;
      font-weight: 600;
    }

    .submit:hover {
      background: #1e40af;
    }

    .preview {
      margin-top: 30px;
    }

    .preview h2 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    .preview-box {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      background: #f8fafc;
    }

    .preview-box img,
    .preview-box video {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 14px;
      display: none;
    }

    .preview-title {
      font-size: 20px;
      font-weight: 600;
    }

    .preview-desc {
      font-size: 16px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Submit a Tip</h1>
    <p class="subtitle">
      Upload a photo or video and describe what you saw.
    </p>

    <div class="card">
      <label>Title</label>
      <input id="title" type="text" placeholder="Example: Broken light near school entrance" />

      <label>Description</label>
      <textarea id="desc" placeholder="Add details such as location, time, and what happened..."></textarea>

      <label>Upload Photo or Video</label>
      <input id="file" type="file" accept="image/*,video/*" />
      <div class="hint">Photos or short videos from your phone or computer</div>

      <button class="submit">Submit Tip</button>
    </div>

    <div class="preview">
      <h2>Preview</h2>
      <div class="preview-box">
        <img id="imgPreview" />
        <video id="videoPreview" controls></video>
        <div class="preview-title" id="pTitle">Your title will appear here</div>
        <div class="preview-desc" id="pDesc">Your description will appear here.</div>
      </div>
    </div>
  </div>

  <script>
    const title = document.getElementById("title");
    const desc = document.getElementById("desc");
    const file = document.getElementById("file");
    const pTitle = document.getElementById("pTitle");
    const pDesc = document.getElementById("pDesc");
    const imgPreview = document.getElementById("imgPreview");
    const videoPreview = document.getElementById("videoPreview");

    title.oninput = () => pTitle.textContent = title.value || "Your title will appear here";
    desc.oninput = () => pDesc.textContent = desc.value || "Your description will appear here.";

    file.onchange = () => {
      const f = file.files[0];
      if (!f) return;

      const url = URL.createObjectURL(f);
      imgPreview.style.display = "none";
      videoPreview.style.display = "none";

      if (f.type.startsWith("image")) {
        imgPreview.src = url;
        imgPreview.style.display = "block";
      } else {
        videoPreview.src = url;
        videoPreview.style.display = "block";
      }
    };
  </script>
</body>
</html>
